<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$PMUSH DOODLE JUMP ∞</title>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; overflow:hidden; touch-action: none; font-family: system-ui, -apple-system, sans-serif; }
        canvas { display:block; margin:0 auto; border:6px solid #00ff9d; box-shadow:0 0 40px #00ff9d, 0 0 80px #8b00ff; }
        #ui { position:absolute; top:15px; left:50%; transform:translateX(-50%); color:#00ff9d; font-size:28px; text-shadow:0 0 15px #00ff9d, 0 0 30px #8b00ff; pointer-events:none; z-index:10; display:flex; gap:30px; }
        #gameOver { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(10,5,30,0.95); color:#ff00cc; padding:25px 40px; border:6px solid #8b00ff; border-radius:20px; text-align:center; display:none; z-index:20; box-shadow:0 0 60px #8b00ff; }
        button { margin-top:15px; padding:15px 40px; font-size:22px; background:#00ff9d; color:#000; border:none; border-radius:12px; cursor:pointer; box-shadow:0 0 20px #00ff9d; }
        button:hover { background:#ff00cc; color:white; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="highScore">0</span></div>
    </div>
    <canvas id="canvas" width="400" height="700"></canvas>

    <div id="gameOver">
        <h1 style="margin:0; font-size:36px; text-shadow:0 0 20px #ff00cc;">GAME OVER</h1>
        <p style="font-size:24px; margin:10px 0;">Your $PMUSH score: <span id="finalScore" style="color:#00ff9d;">0</span></p>
        <button onclick="restartGame()">JUMP AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        let player = { x: 180, y: 450, width: 48, height: 52, dy: 0, speed: 7.5, vx: 0 };
        let platforms = [];
        let particles = [];
        let powerUps = [];
        let gravity = 0.58;
        let score = 0;
        let highScore = localStorage.getItem('pmushHigh') || 0;
        let gameRunning = true;
        let gameTime = 0;
        let keys = {};
        let touchLeft = false;
        let touchRight = false;
        let jetpackTime = 0;

        highScoreEl.textContent = highScore;

        function generatePlatforms() {
            platforms = [];
            for (let i = 0; i < 9; i++) {
                const springChance = Math.min(0.15, 0.07 + score / 9000);
                platforms.push({
                    x: Math.random() * (canvas.width - 75) + 15,
                    y: i * 68 + 110,
                    width: 58,
                    height: 16,
                    spring: Math.random() < springChance
                });
            }
        }

        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x + Math.random() * 20 - 10,
                    y: y,
                    vx: Math.random() * 5 - 2.5,
                    vy: Math.random() * 5 - 6,
                    life: 28,
                    color: color
                });
            }
        }

        function drawMysticalBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a0033');
            grad.addColorStop(0.5, '#2a0055');
            grad.addColorStop(1, '#000011');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.shadowBlur = 8;
            ctx.shadowColor = '#aaffff';
            for (let i = 0; i < 35; i++) {
                const x = (i * 31 + gameTime * 0.15) % canvas.width;
                const y = (i * 19) % (canvas.height * 0.7);
                ctx.fillStyle = `rgba(200,255,255,0.7)`;
                ctx.fillRect(x, y, 2.5, 2.5);
            }
            ctx.shadowBlur = 0;
        }

        function drawPlayer() {
            ctx.save();
            const cx = player.x + player.width / 2;
            const cy = player.y + player.height / 2 - 4;
            const tilt = Math.max(Math.min(player.vx * 0.025, 0.35), -0.35);
            ctx.translate(cx, cy);
            ctx.rotate(tilt);

            ctx.shadowBlur = 15; ctx.shadowColor = '#8b00ff';
            ctx.fillStyle = '#6B2F9E'; ctx.fillRect(-22, 8, 44, 32);

            ctx.shadowBlur = 10; ctx.shadowColor = '#00ff88';
            ctx.fillStyle = '#00C76A'; ctx.fillRect(-18, -8, 36, 22);

            ctx.fillStyle = '#00C76A';
            ctx.beginPath(); ctx.ellipse(0, -18, 21, 19, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.ellipse(-9, -22, 7, 9, 0.15, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(9, -22, 7, 9, -0.15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.ellipse(-9, -22, 3.2, 4.2, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(9, -22, 3.2, 4.2, 0, 0, Math.PI * 2); ctx.fill();

            ctx.shadowBlur = 20; ctx.shadowColor = '#00aaff';
            ctx.fillStyle = '#4A7CFF';
            ctx.beginPath(); ctx.ellipse(0, -33, 26, 14, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 3;
            ctx.beginPath(); ctx.arc(-11, -37, 4.2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(10, -38, 3.8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-4, -29, 3.1, 0, Math.PI * 2); ctx.fill();

            ctx.shadowBlur = 22; ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#3a0088';
            ctx.beginPath(); ctx.moveTo(-8, -46); ctx.lineTo(8, -46); ctx.lineTo(0, -34); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath(); ctx.arc(0, -41, 3.8 + Math.sin(gameTime * 0.25) * 0.6, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        function drawPlatforms() {
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#00ff9d';
            for (let p of platforms) {
                ctx.fillStyle = p.spring ? '#ff00cc' : '#00cc77';
                ctx.beginPath();
                ctx.ellipse(p.x + p.width/2, p.y + p.height/2, p.width/2 + 2, p.height/2 + 4, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#008844'; ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(p.x + 8, p.y + 6);
                ctx.quadraticCurveTo(p.x + p.width/2, p.y + 10, p.x + p.width - 8, p.y + 5);
                ctx.stroke();

                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillRect(p.x + 6, p.y + 3, p.width - 18, 4);
            }
            ctx.shadowBlur = 0;
        }

        function drawPowerUps() {
            ctx.shadowBlur = 15;
            for (let pu of powerUps) {
                if (pu.type === 'coin') {
                    ctx.shadowColor = '#ffff00';
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath(); ctx.arc(pu.x, pu.y, 11, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.font = 'bold 16px system-ui'; ctx.textAlign = 'center';
                    ctx.fillText('$', pu.x, pu.y + 6);
                } else {
                    ctx.shadowColor = '#ff4400';
                    ctx.fillStyle = '#ff4400';
                    ctx.fillRect(pu.x - 9, pu.y - 16, 18, 30);
                    ctx.fillStyle = '#00ffff';
                    ctx.fillRect(pu.x - 13, pu.y - 10, 26, 9);
                }
            }
            ctx.shadowBlur = 0;
        }

        function update() {
            if (!gameRunning) return;
            gameTime++;

            let targetVx = 0;
            if (touchLeft || keys['ArrowLeft'] || keys['a']) targetVx = -1;
            if (touchRight || keys['ArrowRight'] || keys['d']) targetVx = 1;
            player.vx = player.vx * 0.82 + targetVx * player.speed * 0.18;
            player.x += player.vx;

            // NEW: Wrap around sides (smooth toroidal movement)
            if (player.x + player.width < 0) {
                player.x = canvas.width;
            }
            if (player.x > canvas.width) {
                player.x = -player.width;
            }

            if (jetpackTime > 0) {
                player.dy = -8.5;
                jetpackTime--;
                if (Math.random() < 0.6) createParticles(player.x + 24, player.y + 45, 2, '#00ffff');
            } else {
                player.dy += gravity;
            }
            player.y += player.dy;

            for (let p of platforms) {
                if (player.dy > 0 &&
                    player.x + player.width > p.x && player.x < p.x + p.width &&
                    player.y + player.height > p.y && player.y + player.height - player.dy <= p.y + 8) {
                    player.y = p.y - player.height;
                    player.dy = p.spring ? -18.5 : -14.2;
                    createParticles(p.x + p.width/2, p.y, 14, p.spring ? '#ff00cc' : '#00ff9d');
                }
            }

            if (player.y < 240 && player.dy < 0) {
                const scroll = 240 - player.y;
                player.y = 240;
                for (let p of platforms) p.y += scroll;
                for (let pu of powerUps) pu.y += scroll;
                score += Math.floor(scroll * 0.55);
            }

            const gap = 66 + Math.min(26, score / 1400);
            while (platforms[platforms.length - 1].y > 30) {
                const lastY = platforms[platforms.length - 1].y;
                const springChance = Math.min(0.14, 0.20 - score / 16000);
                platforms.push({
                    x: Math.random() * (canvas.width - 75) + 15,
                    y: lastY - gap - Math.random() * 14,
                    width: 58,
                    height: 16,
                    spring: Math.random() < springChance
                });
            }
            if (platforms[0].y > canvas.height + 40) platforms.shift();

            if (Math.random() < 0.008 && powerUps.length < 2 && score > 400) {
                powerUps.push({
                    x: Math.random() * (canvas.width - 50) + 25,
                    y: -40,
                    type: Math.random() < 0.6 ? 'coin' : 'jetpack',
                    vy: 1.4
                });
            }

            for (let i = powerUps.length - 1; i >= 0; i--) {
                const pu = powerUps[i];
                pu.y += pu.vy;
                if (player.x < pu.x + 18 && player.x + player.width > pu.x - 18 &&
                    player.y < pu.y + 18 && player.y + player.height > pu.y - 18) {
                    if (pu.type === 'coin') {
                        score += 180;
                        createParticles(pu.x, pu.y, 16, '#ffff00');
                    } else {
                        jetpackTime = 95;
                        createParticles(pu.x, pu.y, 22, '#00ffff');
                    }
                    powerUps.splice(i, 1);
                }
                if (pu.y > canvas.height + 20) powerUps.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (player.y > canvas.height + 50) {
                gameRunning = false;
                if (score > highScore) {
                    highScore = Math.floor(score);
                    localStorage.setItem('pmushHigh', highScore);
                    highScoreEl.textContent = highScore;
                }
                finalScoreEl.textContent = Math.floor(score);
                gameOverScreen.style.display = 'block';
            }

            scoreEl.textContent = Math.floor(score);
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = p.life / 28;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4.5, 4.5);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMysticalBackground();
            drawPlatforms();
            drawPowerUps();
            drawPlayer();
            drawParticles();
            update();
            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            player.x = 180; player.y = 450; player.dy = -12; player.vx = 0;
            score = 0;
            jetpackTime = 0;
            powerUps = [];
            particles = [];
            gameRunning = true;
            gameOverScreen.style.display = 'none';
            generatePlatforms();
        }

        canvas.addEventListener('touchstart', e => {
            const rect = canvas.getBoundingClientRect();
            for (let t of e.touches) {
                if (t.clientX - rect.left < canvas.width / 2) touchLeft = true;
                else touchRight = true;
            }
        });
        canvas.addEventListener('touchend', () => { touchLeft = false; touchRight = false; });
        canvas.addEventListener('touchmove', e => {
            touchLeft = touchRight = false;
            const rect = canvas.getBoundingClientRect();
            for (let t of e.touches) {
                if (t.clientX - rect.left < canvas.width / 2) touchLeft = true;
                else touchRight = true;
            }
        });

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        generatePlatforms();
        gameLoop();
    </script>
</body>
</html>
